<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Result resolution</title><desc id="desc">Map keyframes to shots and submissions.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Result Resolution</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A search hit is only useful if it becomes a playable shot and a valid evaluation submission.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="90" y="250" width="220" height="110" rx="18"/><rect x="390" y="250" width="220" height="110" rx="18"/><rect x="690" y="250" width="220" height="110" rx="18"/><rect x="990" y="250" width="220" height="110" rx="18"/></g><text x="200" y="294" text-anchor="middle" font-size="20" font-weight="800">Keyframe Hit</text><text x="200" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">video_id + frame</text><text x="500" y="294" text-anchor="middle" font-size="20" font-weight="800">Metadata</text><text x="500" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">FPS + shot boundaries</text><text x="800" y="294" text-anchor="middle" font-size="20" font-weight="800">Playback Segment</text><text x="800" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">HLS + start/end frames</text><text x="1100" y="294" text-anchor="middle" font-size="20" font-weight="800">Submit</text><text x="1100" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">evaluation timestamp</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M310 305 H390"/><path d="M610 305 H690"/><path d="M910 305 H990"/></g></svg>
