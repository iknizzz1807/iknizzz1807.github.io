<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">SkillForge clean architecture</title><desc id="desc">Clean Architecture layers in the Go backend.</desc><rect width="1200" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="600" y="64" text-anchor="middle" font-size="34" font-weight="800">Go Backend Boundaries</text><text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-size="17">Handlers translate transport. Services own business rules. Repositories isolate MongoDB.</text><circle cx="600" cy="405" r="260" fill="#0a0b10" stroke="#1f2350" stroke-width="4"/><circle cx="600" cy="405" r="195" fill="#0e1020" stroke="#6366f1" stroke-opacity=".45" stroke-width="4"/><circle cx="600" cy="405" r="125" fill="#111426" stroke="#818cf8" stroke-width="4"/><circle cx="600" cy="405" r="62" fill="#171b33" stroke="#10b981" stroke-width="4"/><text x="600" y="410" text-anchor="middle" font-size="22" font-weight="800">Domain</text><text x="600" y="310" text-anchor="middle" font-size="21" font-weight="700">Services</text><text x="600" y="528" text-anchor="middle" font-size="21" font-weight="700">Repositories</text><text x="600" y="185" text-anchor="middle" font-size="21" font-weight="700">HTTP + WebSocket Handlers</text><text x="600" y="645" text-anchor="middle" font-size="21" font-weight="700">MongoDB / Python AI / External Edges</text><text x="220" y="405" text-anchor="middle" fill="#94a3b8" font-size="18">Project Service</text><text x="980" y="405" text-anchor="middle" fill="#94a3b8" font-size="18">Notification Service</text><text x="600" y="250" text-anchor="middle" fill="#94a3b8" font-size="18">Auth, Project, Chat, Kanban handlers</text><text x="600" y="575" text-anchor="middle" fill="#94a3b8" font-size="18">UserRepo, ProjectRepo, MessageRepo</text></g></svg>
