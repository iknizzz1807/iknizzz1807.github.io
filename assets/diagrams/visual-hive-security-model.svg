<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Security model</title><desc id="desc">Security model for the ingestion platform.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Security Model</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">The risk is not only login; it is cross-event data access and unsafe ingestion inputs.</text><g fill="#0f111a" stroke="#f59e0b" stroke-opacity=".65"><rect x="80" y="170" width="330" height="140" rx="18"/><rect x="485" y="170" width="330" height="140" rx="18"/><rect x="890" y="170" width="330" height="140" rx="18"/><rect x="80" y="440" width="330" height="140" rx="18"/><rect x="485" y="440" width="330" height="140" rx="18"/><rect x="890" y="440" width="330" height="140" rx="18"/></g><text x="245" y="220" text-anchor="middle" font-size="21" font-weight="800">API Key Hashing</text><text x="245" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">prefix visible, full key bcrypt hashed</text><text x="650" y="220" text-anchor="middle" font-size="21" font-weight="800">Encrypted Tokens</text><text x="650" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">Directus/Qdrant credentials protected</text><text x="1055" y="220" text-anchor="middle" font-size="21" font-weight="800">Event ACL</text><text x="1055" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">owners/viewers per event</text><text x="245" y="490" text-anchor="middle" font-size="21" font-weight="800">File Validation</text><text x="245" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">reject malformed CSV/XLSX early</text><text x="650" y="490" text-anchor="middle" font-size="21" font-weight="800">Tenant Isolation</text><text x="650" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">event-specific Directus + Qdrant config</text><text x="1055" y="490" text-anchor="middle" font-size="21" font-weight="800">Audit State</text><text x="1055" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">job state snapshots and error messages</text></g></svg>
