<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc"><title id="title">Tool safety gate</title><desc id="desc">Safety gate before executing JARVIS tools.</desc><rect width="1400" height="820" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="700" y="62" text-anchor="middle" font-size="36" font-weight="800">Tool Safety Gate</text><text x="700" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">The LLM can propose actions. The runtime decides whether they are allowed, safe, and confirmed.</text><g fill="#0f111a" stroke="#f59e0b" stroke-opacity=".65"><rect x="80" y="250" width="190" height="100" rx="18"/><rect x="335" y="250" width="190" height="100" rx="18"/><rect x="590" y="250" width="190" height="100" rx="18"/><rect x="845" y="250" width="190" height="100" rx="18"/><rect x="1100" y="250" width="190" height="100" rx="18"/><rect x="590" y="520" width="190" height="100" rx="18" stroke="#ef4444"/></g><text x="175" y="292" text-anchor="middle" font-size="18" font-weight="800">LLM Intent</text><text x="175" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">"set volume"</text><text x="430" y="292" text-anchor="middle" font-size="18" font-weight="800">Tool Allowlist</text><text x="430" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">registered MCP</text><text x="685" y="292" text-anchor="middle" font-size="18" font-weight="800">Schema Check</text><text x="685" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">typed args</text><text x="940" y="292" text-anchor="middle" font-size="18" font-weight="800">Risk Class</text><text x="940" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">safe/sensitive</text><text x="1195" y="292" text-anchor="middle" font-size="18" font-weight="800">Execute</text><text x="1195" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">JSON-RPC result</text><text x="685" y="562" text-anchor="middle" font-size="18" font-weight="800">Ask Confirmation</text><text x="685" y="592" text-anchor="middle" fill="#94a3b8" font-size="13">if side effect is risky</text></g><g stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M270 300 H335"/><path d="M525 300 H590"/><path d="M780 300 H845"/><path d="M1035 300 H1100"/><path d="M940 350 C920 485 780 560 780 560"/><path d="M780 560 C980 560 1080 400 1100 330"/></g></svg>
