<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 780" role="img" aria-labelledby="title desc"><title id="title">AIC ingestion pipeline</title><desc id="desc">Video ingestion into multimodal indexes.</desc><rect width="1500" height="780" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">Ingestion Pipeline: One Video Becomes Multiple Search Surfaces</text><text x="750" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">The system indexes the same timeline through visual embeddings, objects, speech, and audio fingerprints.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="70" y="250" width="170" height="110" rx="18"/><rect x="300" y="250" width="170" height="110" rx="18"/><rect x="530" y="140" width="180" height="110" rx="18"/><rect x="530" y="360" width="180" height="110" rx="18"/><rect x="780" y="140" width="180" height="110" rx="18"/><rect x="780" y="360" width="180" height="110" rx="18"/><rect x="1030" y="140" width="180" height="110" rx="18"/><rect x="1030" y="360" width="180" height="110" rx="18"/></g><text x="155" y="294" text-anchor="middle" font-size="19" font-weight="800">Video/HLS</text><text x="155" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">media source</text><text x="385" y="294" text-anchor="middle" font-size="19" font-weight="800">Keyframes</text><text x="385" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">timestamp anchors</text><text x="620" y="184" text-anchor="middle" font-size="19" font-weight="800">CLIP / BEIT3</text><text x="620" y="214" text-anchor="middle" fill="#94a3b8" font-size="13">visual vectors</text><text x="620" y="404" text-anchor="middle" font-size="19" font-weight="800">Object CSV</text><text x="620" y="434" text-anchor="middle" fill="#94a3b8" font-size="13">classes + boxes</text><text x="870" y="184" text-anchor="middle" font-size="19" font-weight="800">Transcripts</text><text x="870" y="214" text-anchor="middle" fill="#94a3b8" font-size="13">speech text</text><text x="870" y="404" text-anchor="middle" font-size="19" font-weight="800">Audio WAV</text><text x="870" y="434" text-anchor="middle" fill="#94a3b8" font-size="13">FFmpeg concat</text><text x="1120" y="184" text-anchor="middle" font-size="19" font-weight="800">Milvus</text><text x="1120" y="214" text-anchor="middle" fill="#94a3b8" font-size="13">vector index</text><text x="1120" y="404" text-anchor="middle" font-size="19" font-weight="800">Mongo/ES/FP</text><text x="1120" y="434" text-anchor="middle" fill="#94a3b8" font-size="13">object/text/audio</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M240 305 H300"/><path d="M470 290 C505 250 505 205 530 195"/><path d="M470 320 C505 355 505 405 530 415"/><path d="M710 195 H780"/><path d="M710 415 H780"/><path d="M960 195 H1030"/><path d="M960 415 H1030"/></g></svg>
