<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"><title id="title">WebSocket lifecycle</title><desc id="desc">Realtime event lifecycle for SkillForge.</desc><rect width="1200" height="720" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="600" y="60" text-anchor="middle" font-size="34" font-weight="800">Realtime Event Lifecycle</text><text x="600" y="94" text-anchor="middle" fill="#94a3b8" font-size="17">A Kanban move or chat message becomes a validated event, not a polling loop.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".55"><rect x="55" y="260" width="150" height="100" rx="18"/><rect x="260" y="260" width="170" height="100" rx="18"/><rect x="485" y="260" width="180" height="100" rx="18"/><rect x="720" y="260" width="170" height="100" rx="18"/><rect x="945" y="260" width="190" height="100" rx="18"/></g><text x="130" y="302" text-anchor="middle" font-size="19" font-weight="700">Client Event</text><text x="130" y="330" text-anchor="middle" fill="#94a3b8" font-size="13">drag / send</text><text x="345" y="302" text-anchor="middle" font-size="19" font-weight="700">Validate</text><text x="345" y="330" text-anchor="middle" fill="#94a3b8" font-size="13">auth + room</text><text x="575" y="302" text-anchor="middle" font-size="19" font-weight="700">Persist</text><text x="575" y="330" text-anchor="middle" fill="#94a3b8" font-size="13">MongoDB write</text><text x="805" y="302" text-anchor="middle" font-size="19" font-weight="700">Broadcast</text><text x="805" y="330" text-anchor="middle" fill="#94a3b8" font-size="13">room fanout</text><text x="1040" y="302" text-anchor="middle" font-size="19" font-weight="700">Reconcile UI</text><text x="1040" y="330" text-anchor="middle" fill="#94a3b8" font-size="13">Svelte update</text><rect x="420" y="500" width="360" height="92" rx="18" fill="#111426" stroke="#10b981" stroke-opacity=".75"/><text x="600" y="540" text-anchor="middle" font-size="22" font-weight="800">Idempotent Event Shape</text><text x="600" y="568" text-anchor="middle" fill="#94a3b8" font-size="14">event_id, room_id, actor_id, entity_id, version</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M205 310 H260"/><path d="M430 310 H485"/><path d="M665 310 H720"/><path d="M890 310 H945"/><path d="M575 360 C575 420 595 455 600 500"/></g></svg>
