<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 780" role="img" aria-labelledby="title desc"><title id="title">Hybrid retrieval</title><desc id="desc">Query fans out to vector, object, and transcript search.</desc><rect width="1500" height="780" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">Hybrid Retrieval: No Single Signal Is Enough</text><text x="750" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">Semantic visuals, detected objects, and transcript text answer different kinds of user intent.</text><rect x="90" y="300" width="210" height="120" rx="20" fill="#111426" stroke="#818cf8"/><text x="195" y="350" text-anchor="middle" font-size="22" font-weight="800">User Query</text><text x="195" y="382" text-anchor="middle" fill="#94a3b8" font-size="14">text + objects + audio</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="470" y="150" width="230" height="110" rx="18"/><rect x="470" y="320" width="230" height="110" rx="18"/><rect x="470" y="490" width="230" height="110" rx="18"/><rect x="880" y="320" width="230" height="110" rx="18"/><rect x="1190" y="320" width="210" height="110" rx="18"/></g><text x="585" y="194" text-anchor="middle" font-size="20" font-weight="800">Milvus</text><text x="585" y="224" text-anchor="middle" fill="#94a3b8" font-size="13">CLIP + BEIT3 vectors</text><text x="585" y="364" text-anchor="middle" font-size="20" font-weight="800">MongoDB</text><text x="585" y="394" text-anchor="middle" fill="#94a3b8" font-size="13">object constraints</text><text x="585" y="534" text-anchor="middle" font-size="20" font-weight="800">Elasticsearch</text><text x="585" y="564" text-anchor="middle" fill="#94a3b8" font-size="13">transcript search</text><text x="995" y="364" text-anchor="middle" font-size="20" font-weight="800">Intersect</text><text x="995" y="394" text-anchor="middle" fill="#94a3b8" font-size="13">same video/keyframe</text><text x="1295" y="364" text-anchor="middle" font-size="20" font-weight="800">Timestamp</text><text x="1295" y="394" text-anchor="middle" fill="#94a3b8" font-size="13">shot + frame result</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M300 350 C385 250 390 200 470 205"/><path d="M300 360 H470"/><path d="M300 375 C385 460 390 545 470 545"/><path d="M700 205 C790 250 805 340 880 350"/><path d="M700 375 H880"/><path d="M700 545 C790 500 805 390 880 380"/><path d="M1110 375 H1190"/></g></svg>
