<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 780" role="img" aria-labelledby="title desc"><title id="title">Threat model</title><desc id="desc">Security concerns for SkillForge.</desc><rect width="1300" height="780" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Threat Model Surface</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">The platform has auth, realtime, AI, and multi-role authorization risks.</text><rect x="460" y="255" width="380" height="210" rx="28" fill="#111426" stroke="#818cf8"/><text x="650" y="345" text-anchor="middle" font-size="28" font-weight="800">SkillForge Backend</text><text x="650" y="380" text-anchor="middle" fill="#94a3b8" font-size="16">authorization + event validation</text><g fill="#0f111a" stroke="#f59e0b" stroke-opacity=".65"><rect x="80" y="155" width="260" height="100" rx="18"/><rect x="80" y="500" width="260" height="100" rx="18"/><rect x="960" y="155" width="260" height="100" rx="18"/><rect x="960" y="500" width="260" height="100" rx="18"/></g><text x="210" y="198" text-anchor="middle" font-size="20" font-weight="800">Unauthorized Room Join</text><text x="210" y="226" text-anchor="middle" fill="#94a3b8" font-size="13">socket privilege escalation</text><text x="210" y="543" text-anchor="middle" font-size="20" font-weight="800">Prompt / Profile Abuse</text><text x="210" y="571" text-anchor="middle" fill="#94a3b8" font-size="13">dirty matching input</text><text x="1090" y="198" text-anchor="middle" font-size="20" font-weight="800">IDOR</text><text x="1090" y="226" text-anchor="middle" fill="#94a3b8" font-size="13">project/application access</text><text x="1090" y="543" text-anchor="middle" font-size="20" font-weight="800">Notification Spam</text><text x="1090" y="571" text-anchor="middle" fill="#94a3b8" font-size="13">event fanout abuse</text></g><g stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M340 205 C410 225 430 280 460 315"/><path d="M340 550 C420 515 430 420 460 395"/><path d="M960 205 C890 230 870 280 840 315"/><path d="M960 550 C890 510 870 420 840 395"/></g><text x="650" y="705" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="17">Mitigations: role checks, room membership validation, payload schemas, event rate limits, canonical state reload.</text></svg>
