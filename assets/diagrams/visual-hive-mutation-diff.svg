<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Mutation diff strategy</title><desc id="desc">Diff records before mutation.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Diff Before Mutate</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Bulk imports are dangerous unless create/update/delete decisions are explicit.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="80" y="185" width="260" height="125" rx="18"/><rect x="80" y="450" width="260" height="125" rx="18"/><rect x="510" y="310" width="280" height="140" rx="20"/><rect x="960" y="155" width="240" height="100" rx="18"/><rect x="960" y="330" width="240" height="100" rx="18"/><rect x="960" y="505" width="240" height="100" rx="18"/></g><text x="210" y="235" text-anchor="middle" font-size="21" font-weight="800">Cleaned Rows</text><text x="210" y="265" text-anchor="middle" fill="#94a3b8" font-size="14">candidate import set</text><text x="210" y="500" text-anchor="middle" font-size="21" font-weight="800">Existing Directus</text><text x="210" y="530" text-anchor="middle" fill="#94a3b8" font-size="14">current source of truth</text><text x="650" y="365" text-anchor="middle" font-size="24" font-weight="800">Diff Engine</text><text x="650" y="398" text-anchor="middle" fill="#94a3b8" font-size="14">lookup keys + field comparison</text><text x="1080" y="198" text-anchor="middle" font-size="20" font-weight="800">Create</text><text x="1080" y="228" text-anchor="middle" fill="#94a3b8" font-size="13">new records</text><text x="1080" y="373" text-anchor="middle" font-size="20" font-weight="800">Update</text><text x="1080" y="403" text-anchor="middle" fill="#94a3b8" font-size="13">changed fields</text><text x="1080" y="548" text-anchor="middle" font-size="20" font-weight="800">Skip / Delete</text><text x="1080" y="578" text-anchor="middle" fill="#94a3b8" font-size="13">no-op or removal</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M340 247 C430 250 455 335 510 360"/><path d="M340 512 C430 505 455 425 510 400"/><path d="M790 350 C875 300 890 205 960 205"/><path d="M790 380 H960"/><path d="M790 410 C875 455 890 550 960 555"/></g></svg>
