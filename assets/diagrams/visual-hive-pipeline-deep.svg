<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc"><title id="title">Ingestion pipeline</title><desc id="desc">Extract Analyze Clean Validate Mutate Sync stages.</desc><rect width="1500" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">Fail-Fast Ingestion Pipeline</text><text x="750" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Dirty spreadsheets move through explicit states before touching Directus or Qdrant.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="70" y="250" width="175" height="110" rx="18"/><rect x="290" y="250" width="175" height="110" rx="18"/><rect x="510" y="250" width="175" height="110" rx="18"/><rect x="730" y="250" width="175" height="110" rx="18"/><rect x="950" y="250" width="175" height="110" rx="18"/><rect x="1170" y="250" width="175" height="110" rx="18"/></g><text x="157" y="294" text-anchor="middle" font-size="21" font-weight="800">Extract</text><text x="157" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">CSV / XLSX rows</text><text x="377" y="294" text-anchor="middle" font-size="21" font-weight="800">Analyze</text><text x="377" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">header mapping</text><text x="597" y="294" text-anchor="middle" font-size="21" font-weight="800">Clean</text><text x="597" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">normalize values</text><text x="817" y="294" text-anchor="middle" font-size="21" font-weight="800">Validate</text><text x="817" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">types + required</text><text x="1037" y="294" text-anchor="middle" font-size="21" font-weight="800">Mutate</text><text x="1037" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">diff + write</text><text x="1257" y="294" text-anchor="middle" font-size="21" font-weight="800">Sync</text><text x="1257" y="324" text-anchor="middle" fill="#94a3b8" font-size="14">vectors</text><rect x="385" y="510" width="730" height="92" rx="18" fill="#111426" stroke="#6366f1" stroke-opacity=".75"/><text x="750" y="550" text-anchor="middle" font-size="22" font-weight="800">ingestion_jobs stores state snapshots per stage</text><text x="750" y="580" text-anchor="middle" fill="#94a3b8" font-size="14">extract_state, analysis_state, cleanup_state, validation_state, diff_state, mutation_state</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M245 305 H290"/><path d="M465 305 H510"/><path d="M685 305 H730"/><path d="M905 305 H950"/><path d="M1125 305 H1170"/><path d="M817 360 V510"/></g></svg>
