<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">MQTT UDP transport</title><desc id="desc">Control over MQTT and encrypted audio over UDP.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">MQTT + UDP Hybrid Transport</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Control messages and audio packets have different latency and reliability requirements.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="95" y="300" width="240" height="130" rx="20"/><rect x="530" y="160" width="240" height="130" rx="20"/><rect x="530" y="470" width="240" height="130" rx="20"/><rect x="965" y="300" width="240" height="130" rx="20"/></g><text x="215" y="350" text-anchor="middle" font-size="22" font-weight="800">ESP32</text><text x="215" y="382" text-anchor="middle" fill="#94a3b8" font-size="14">device client</text><text x="650" y="210" text-anchor="middle" font-size="22" font-weight="800">MQTT Control</text><text x="650" y="242" text-anchor="middle" fill="#94a3b8" font-size="14">hello, listen, abort, MCP</text><text x="650" y="520" text-anchor="middle" font-size="22" font-weight="800">UDP Audio</text><text x="650" y="552" text-anchor="middle" fill="#94a3b8" font-size="14">Opus + AES-CTR + sequence</text><text x="1085" y="350" text-anchor="middle" font-size="22" font-weight="800">Server</text><text x="1085" y="382" text-anchor="middle" fill="#94a3b8" font-size="14">orchestration runtime</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M335 340 C430 260 450 225 530 225"/><path d="M770 225 C860 230 885 315 965 340"/><path d="M335 390 C430 485 450 535 530 535"/><path d="M770 535 C860 525 885 405 965 390"/></g></svg>
