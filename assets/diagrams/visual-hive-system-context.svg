<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Visual Hive system context</title><desc id="desc">Actors and systems around the data ingestion platform.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">System Context</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">The platform turns messy event spreadsheets into queryable CMS and vector-search knowledge.</text><rect x="440" y="250" width="420" height="230" rx="30" fill="#111426" stroke="#818cf8"/><text x="650" y="342" text-anchor="middle" font-size="30" font-weight="800">Data Ingestion Platform</text><text x="650" y="380" text-anchor="middle" fill="#94a3b8" font-size="16">SvelteKit control plane + ingestion engine</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="70" y="150" width="250" height="110" rx="18"/><rect x="70" y="500" width="250" height="110" rx="18"/><rect x="980" y="145" width="250" height="110" rx="18"/><rect x="980" y="500" width="250" height="110" rx="18"/></g><text x="195" y="194" text-anchor="middle" font-size="21" font-weight="800">Ops Team</text><text x="195" y="225" text-anchor="middle" fill="#94a3b8" font-size="14">uploads CSV/XLSX</text><text x="195" y="544" text-anchor="middle" font-size="21" font-weight="800">Event Data</text><text x="195" y="575" text-anchor="middle" fill="#94a3b8" font-size="14">sessions, speakers, attendees</text><text x="1105" y="189" text-anchor="middle" font-size="21" font-weight="800">Directus</text><text x="1105" y="220" text-anchor="middle" fill="#94a3b8" font-size="14">relational source of truth</text><text x="1105" y="544" text-anchor="middle" font-size="21" font-weight="800">Qdrant</text><text x="1105" y="575" text-anchor="middle" fill="#94a3b8" font-size="14">semantic search index</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M320 205 C400 220 405 300 440 330"/><path d="M320 555 C400 520 405 430 440 395"/><path d="M860 330 C920 295 930 220 980 200"/><path d="M860 395 C925 435 930 530 980 555"/></g></svg>
