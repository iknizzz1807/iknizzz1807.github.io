<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS audio pipeline</title><desc id="desc">Wake word to ASR LLM TTS response pipeline.</desc><rect width="1500" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">Realtime Audio Pipeline</text><text x="750" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Voice latency is shaped by buffering, codec frames, model streaming, and interruption handling.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="60" y="250" width="165" height="110" rx="18"/><rect x="270" y="250" width="165" height="110" rx="18"/><rect x="480" y="250" width="165" height="110" rx="18"/><rect x="690" y="250" width="165" height="110" rx="18"/><rect x="900" y="250" width="165" height="110" rx="18"/><rect x="1110" y="250" width="165" height="110" rx="18"/></g><text x="142" y="294" text-anchor="middle" font-size="19" font-weight="800">Wake/VAD</text><text x="142" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">detect speech</text><text x="352" y="294" text-anchor="middle" font-size="19" font-weight="800">Opus Frames</text><text x="352" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">60ms packets</text><text x="562" y="294" text-anchor="middle" font-size="19" font-weight="800">Transport</text><text x="562" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">WS or MQTT+UDP</text><text x="772" y="294" text-anchor="middle" font-size="19" font-weight="800">ASR</text><text x="772" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">speech to text</text><text x="982" y="294" text-anchor="middle" font-size="19" font-weight="800">LLM + Tools</text><text x="982" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">reason + call</text><text x="1192" y="294" text-anchor="middle" font-size="19" font-weight="800">TTS Stream</text><text x="1192" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">audio response</text><rect x="515" y="510" width="470" height="90" rx="18" fill="#111426" stroke="#ef4444" stroke-opacity=".75"/><text x="750" y="550" text-anchor="middle" font-size="22" font-weight="800">Barge-in path</text><text x="750" y="578" text-anchor="middle" fill="#94a3b8" font-size="14">new speech aborts current TTS and re-enters listening state</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M225 305 H270"/><path d="M435 305 H480"/><path d="M645 305 H690"/><path d="M855 305 H900"/><path d="M1065 305 H1110"/><path d="M1192 360 C1110 505 920 552 985 552"/></g></svg>
