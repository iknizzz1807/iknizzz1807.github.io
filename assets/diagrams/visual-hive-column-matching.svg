<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Column matching</title><desc id="desc">How headers map to schema fields.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Smart Column Matching</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Messy client headers are normalized against canonical fields and synonyms.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="80" y="170" width="270" height="390" rx="20"/><rect x="515" y="205" width="270" height="320" rx="20"/><rect x="950" y="170" width="270" height="390" rx="20"/></g><text x="215" y="220" text-anchor="middle" font-size="23" font-weight="800">Incoming Headers</text><text x="650" y="255" text-anchor="middle" font-size="23" font-weight="800">Analyzer</text><text x="1085" y="220" text-anchor="middle" font-size="23" font-weight="800">Canonical Fields</text><g fill="#94a3b8" font-size="17"><text x="135" y="285">Session Title</text><text x="135" y="335">Presenter Name</text><text x="135" y="385">Starts On</text><text x="135" y="435">Booth No.</text><text x="135" y="485">Company Website</text><text x="575" y="320">normalize_case()</text><text x="575" y="370">synonym lookup</text><text x="575" y="420">levenshtein score</text><text x="1000" y="285">name</text><text x="1000" y="335">speaker_ids</text><text x="1000" y="385">start_date</text><text x="1000" y="435">stand</text><text x="1000" y="485">website_url</text></g></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M350 360 H515"/><path d="M785 360 H950"/></g></svg>
