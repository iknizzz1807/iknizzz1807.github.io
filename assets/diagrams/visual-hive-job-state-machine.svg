<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc"><title id="title">Ingestion job state machine</title><desc id="desc">Statuses tracked by ingestion_jobs.</desc><rect width="1500" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">ingestion_jobs State Machine</text><text x="750" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Each stage is observable and resumable as structured state, not hidden console output.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="70" y="245" width="135" height="74" rx="14"/><rect x="250" y="245" width="135" height="74" rx="14"/><rect x="430" y="245" width="135" height="74" rx="14"/><rect x="610" y="245" width="135" height="74" rx="14"/><rect x="790" y="245" width="135" height="74" rx="14"/><rect x="970" y="245" width="135" height="74" rx="14"/><rect x="1150" y="245" width="135" height="74" rx="14"/><rect x="655" y="500" width="190" height="74" rx="14" stroke="#10b981"/><rect x="655" y="620" width="190" height="74" rx="14" stroke="#ef4444"/></g><text x="137" y="289" text-anchor="middle" font-size="15" font-weight="800">PENDING</text><text x="317" y="289" text-anchor="middle" font-size="15" font-weight="800">EXTRACTING</text><text x="497" y="289" text-anchor="middle" font-size="15" font-weight="800">ANALYZING</text><text x="677" y="289" text-anchor="middle" font-size="15" font-weight="800">CLEANING</text><text x="857" y="289" text-anchor="middle" font-size="15" font-weight="800">VALIDATING</text><text x="1037" y="289" text-anchor="middle" font-size="15" font-weight="800">MUTATING</text><text x="1217" y="289" text-anchor="middle" font-size="15" font-weight="800">SYNCING</text><text x="750" y="545" text-anchor="middle" font-size="17" font-weight="800">COMPLETED</text><text x="750" y="665" text-anchor="middle" font-size="17" font-weight="800">FAILED</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M205 282 H250"/><path d="M385 282 H430"/><path d="M565 282 H610"/><path d="M745 282 H790"/><path d="M925 282 H970"/><path d="M1105 282 H1150"/><path d="M1217 319 C1150 470 925 535 845 537"/><path d="M677 319 C660 425 700 560 750 620"/></g></svg>
