<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Failure and observability</title><desc id="desc">Failure modes and metrics for multimodal retrieval.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Failure Modes + Observability</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Multimodal search fails when one index is stale, one modality dominates, or timestamps drift.</text><g fill="#0f111a" stroke="#ef4444" stroke-opacity=".6"><rect x="80" y="160" width="250" height="150" rx="18"/><rect x="385" y="160" width="250" height="150" rx="18"/><rect x="690" y="160" width="250" height="150" rx="18"/><rect x="995" y="160" width="250" height="150" rx="18"/></g><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="230" y="430" width="250" height="150" rx="18"/><rect x="535" y="430" width="250" height="150" rx="18"/><rect x="840" y="430" width="250" height="150" rx="18"/></g><text x="205" y="210" text-anchor="middle" font-size="20" font-weight="800">Index Drift</text><text x="510" y="210" text-anchor="middle" font-size="20" font-weight="800">Model Bias</text><text x="815" y="210" text-anchor="middle" font-size="20" font-weight="800">Timestamp Error</text><text x="1120" y="210" text-anchor="middle" font-size="20" font-weight="800">Empty Intersect</text><text x="355" y="480" text-anchor="middle" font-size="20" font-weight="800">Recall@K</text><text x="660" y="480" text-anchor="middle" font-size="20" font-weight="800">Stage Latency</text><text x="965" y="480" text-anchor="middle" font-size="20" font-weight="800">Modality Hits</text><g fill="#94a3b8" font-size="14"><text x="205" y="240" text-anchor="middle">Milvus/Mongo/ES disagree</text><text x="510" y="240" text-anchor="middle">visual model misses text/audio</text><text x="815" y="240" text-anchor="middle">frame maps to wrong shot</text><text x="1120" y="240" text-anchor="middle">filters over-constrain</text><text x="355" y="512" text-anchor="middle">retrieval quality</text><text x="660" y="512" text-anchor="middle">search bottlenecks</text><text x="965" y="512" text-anchor="middle">which signal won</text></g></g></svg>
