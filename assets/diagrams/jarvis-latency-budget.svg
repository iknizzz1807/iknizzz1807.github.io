<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS latency budget</title><desc id="desc">Latency budget from speech capture to audible response.</desc><rect width="1500" height="760" fill="#050713"/><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#10b981"/><stop offset=".55" stop-color="#818cf8"/><stop offset="1" stop-color="#ef4444"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="64" text-anchor="middle" font-size="36" font-weight="800">Latency Budget: Where the Assistant Actually Feels Smart or Broken</text><text x="750" y="102" text-anchor="middle" fill="#94a3b8" font-size="17">The goal is not only model quality. The user judges the system by the silence between turns.</text><rect x="130" y="210" width="1240" height="64" rx="32" fill="#0f111a" stroke="#24305f"/><rect x="130" y="210" width="910" height="64" rx="32" fill="url(#g)" opacity=".85"/><text x="130" y="315" fill="#94a3b8" font-size="15">0ms</text><text x="455" y="315" fill="#94a3b8" font-size="15">250ms</text><text x="780" y="315" fill="#94a3b8" font-size="15">500ms</text><text x="1105" y="315" fill="#94a3b8" font-size="15">750ms</text><text x="1365" y="315" fill="#94a3b8" font-size="15">1000ms+</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="115" y="410" width="180" height="100" rx="18"/><rect x="340" y="410" width="180" height="100" rx="18"/><rect x="565" y="410" width="180" height="100" rx="18"/><rect x="790" y="410" width="180" height="100" rx="18"/><rect x="1015" y="410" width="180" height="100" rx="18"/><rect x="1240" y="410" width="180" height="100" rx="18"/></g><text x="205" y="450" text-anchor="middle" font-size="18" font-weight="800">Capture</text><text x="205" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">wake/VAD</text><text x="430" y="450" text-anchor="middle" font-size="18" font-weight="800">Encode</text><text x="430" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">Opus frames</text><text x="655" y="450" text-anchor="middle" font-size="18" font-weight="800">Transport</text><text x="655" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">WS / UDP</text><text x="880" y="450" text-anchor="middle" font-size="18" font-weight="800">ASR</text><text x="880" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">partial text</text><text x="1105" y="450" text-anchor="middle" font-size="18" font-weight="800">Reason</text><text x="1105" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">LLM + tools</text><text x="1330" y="450" text-anchor="middle" font-size="18" font-weight="800">Speak</text><text x="1330" y="480" text-anchor="middle" fill="#94a3b8" font-size="13">TTS stream</text><text x="750" y="625" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="800">Design pressure: every stage must stream or overlap. Waiting for complete turns makes the device feel dead.</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M295 460 H340"/><path d="M520 460 H565"/><path d="M745 460 H790"/><path d="M970 460 H1015"/><path d="M1195 460 H1240"/></g></svg>
