<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Audio fingerprint ingestion</title><desc id="desc">HLS audio converted to WAV and fingerprinted.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Audio Fingerprint Surface</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Audio identity search is different from transcript search: it matches sound patterns, not words.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="90" y="250" width="220" height="110" rx="18"/><rect x="390" y="250" width="220" height="110" rx="18"/><rect x="690" y="250" width="220" height="110" rx="18"/><rect x="990" y="250" width="220" height="110" rx="18"/></g><text x="200" y="294" text-anchor="middle" font-size="20" font-weight="800">HLS Segments</text><text x="200" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">seg_0.ts ... seg_n.ts</text><text x="500" y="294" text-anchor="middle" font-size="20" font-weight="800">FFmpeg</text><text x="500" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">concat → mono WAV</text><text x="800" y="294" text-anchor="middle" font-size="20" font-weight="800">Fingerprint</text><text x="800" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">hashes by video</text><text x="1100" y="294" text-anchor="middle" font-size="20" font-weight="800">Audio DB</text><text x="1100" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">audio_fingerprints.pkl</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M310 305 H390"/><path d="M610 305 H690"/><path d="M910 305 H990"/></g></svg>
