<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS system context</title><desc id="desc">ESP32 voice device, Python server, AI models, memory, and tools.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">System Context</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A hardware voice assistant is a realtime distributed system, not a chatbot with a speaker.</text><rect x="470" y="250" width="360" height="220" rx="30" fill="#111426" stroke="#818cf8"/><text x="650" y="340" text-anchor="middle" font-size="30" font-weight="800">JARVIS Server</text><text x="650" y="378" text-anchor="middle" fill="#94a3b8" font-size="16">Python orchestration + memory + tools</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="70" y="150" width="260" height="120" rx="18"/><rect x="70" y="500" width="260" height="120" rx="18"/><rect x="970" y="145" width="260" height="120" rx="18"/><rect x="970" y="500" width="260" height="120" rx="18"/></g><text x="200" y="198" text-anchor="middle" font-size="22" font-weight="800">ESP32 Device</text><text x="200" y="230" text-anchor="middle" fill="#94a3b8" font-size="14">mic, speaker, display, GPIO</text><text x="200" y="548" text-anchor="middle" font-size="22" font-weight="800">User</text><text x="200" y="580" text-anchor="middle" fill="#94a3b8" font-size="14">wake word + voice intent</text><text x="1100" y="193" text-anchor="middle" font-size="22" font-weight="800">AI Models</text><text x="1100" y="225" text-anchor="middle" fill="#94a3b8" font-size="14">ASR, LLM, TTS, VAD</text><text x="1100" y="548" text-anchor="middle" font-size="22" font-weight="800">Tools + Memory</text><text x="1100" y="580" text-anchor="middle" fill="#94a3b8" font-size="14">MCP, reminders, finance, ChromaDB</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M330 210 C405 240 420 310 470 330"/><path d="M330 560 C410 520 420 420 470 390"/><path d="M830 330 C895 295 910 215 970 205"/><path d="M830 390 C900 420 915 540 970 560"/></g></svg>
