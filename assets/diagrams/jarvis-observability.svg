<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS observability</title><desc id="desc">Observability metrics for voice assistant.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Observability Plan</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Voice UX quality is measured in turns, interruptions, packet timing, and tool success.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="80" y="160" width="250" height="150" rx="18"/><rect x="385" y="160" width="250" height="150" rx="18"/><rect x="690" y="160" width="250" height="150" rx="18"/><rect x="995" y="160" width="250" height="150" rx="18"/><rect x="230" y="430" width="250" height="150" rx="18"/><rect x="535" y="430" width="250" height="150" rx="18"/><rect x="840" y="430" width="250" height="150" rx="18"/></g><text x="205" y="208" text-anchor="middle" font-size="21" font-weight="800">Wake Accuracy</text><text x="205" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">false wake / missed wake</text><text x="510" y="208" text-anchor="middle" font-size="21" font-weight="800">Audio Latency</text><text x="510" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">capture → first token/audio</text><text x="815" y="208" text-anchor="middle" font-size="21" font-weight="800">Barge-In Rate</text><text x="815" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">interruptions handled</text><text x="1120" y="208" text-anchor="middle" font-size="21" font-weight="800">Tool Success</text><text x="1120" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">JSON-RPC success/error</text><text x="355" y="478" text-anchor="middle" font-size="21" font-weight="800">Memory Hit Rate</text><text x="355" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">useful retrievals</text><text x="660" y="478" text-anchor="middle" font-size="21" font-weight="800">Packet Health</text><text x="660" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">jitter, loss, reorder</text><text x="965" y="478" text-anchor="middle" font-size="21" font-weight="800">Turn Completion</text><text x="965" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">successful user intents</text></g></svg>
