<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">SkillForge system context</title><desc id="desc">Actors and external boundaries for SkillForge.</desc><rect width="1200" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="600" y="64" text-anchor="middle" font-size="34" font-weight="800">System Context</text><text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-size="17">Who touches the platform and which boundary each interaction crosses.</text><rect x="430" y="210" width="340" height="220" rx="28" fill="#111426" stroke="#818cf8"/><text x="600" y="300" text-anchor="middle" font-size="30" font-weight="800">SkillForge Platform</text><text x="600" y="336" text-anchor="middle" fill="#94a3b8" font-size="16">marketplace + collaboration + AI matching</text><rect x="70" y="180" width="210" height="100" rx="18" fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"/><text x="175" y="225" text-anchor="middle" font-size="22" font-weight="700">Student</text><text x="175" y="254" text-anchor="middle" fill="#94a3b8" font-size="14">profile, apply, chat</text><rect x="70" y="420" width="210" height="100" rx="18" fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"/><text x="175" y="465" text-anchor="middle" font-size="22" font-weight="700">Company</text><text x="175" y="494" text-anchor="middle" fill="#94a3b8" font-size="14">post project, review</text><rect x="915" y="180" width="210" height="100" rx="18" fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"/><text x="1020" y="225" text-anchor="middle" font-size="22" font-weight="700">Admin</text><text x="1020" y="254" text-anchor="middle" fill="#94a3b8" font-size="14">moderation, audit</text><rect x="915" y="420" width="210" height="100" rx="18" fill="#0f111a" stroke="#10b981" stroke-opacity=".7"/><text x="1020" y="465" text-anchor="middle" font-size="22" font-weight="700">AI Worker</text><text x="1020" y="494" text-anchor="middle" fill="#94a3b8" font-size="14">semantic ranking</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M280 230 C340 235 370 275 430 295"/><path d="M280 470 C350 460 375 390 430 360"/><path d="M915 230 C850 235 820 275 770 295"/><path d="M770 365 C845 400 860 465 915 470"/></g></svg>
