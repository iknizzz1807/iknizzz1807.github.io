<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS failure modes</title><desc id="desc">Failure modes and containment.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Failure Mode Analysis</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Voice products fail through latency, interruption, network, and unsafe tool execution.</text><g fill="#0f111a" stroke="#ef4444" stroke-opacity=".6"><rect x="80" y="160" width="250" height="150" rx="18"/><rect x="385" y="160" width="250" height="150" rx="18"/><rect x="690" y="160" width="250" height="150" rx="18"/><rect x="995" y="160" width="250" height="150" rx="18"/></g><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="80" y="430" width="250" height="150" rx="18"/><rect x="385" y="430" width="250" height="150" rx="18"/><rect x="690" y="430" width="250" height="150" rx="18"/><rect x="995" y="430" width="250" height="150" rx="18"/></g><text x="205" y="210" text-anchor="middle" font-size="20" font-weight="800">Network Drop</text><text x="510" y="210" text-anchor="middle" font-size="20" font-weight="800">TTS Barge-In</text><text x="815" y="210" text-anchor="middle" font-size="20" font-weight="800">Tool Error</text><text x="1120" y="210" text-anchor="middle" font-size="20" font-weight="800">Memory Drift</text><text x="205" y="480" text-anchor="middle" font-size="20" font-weight="800">Reconnect</text><text x="510" y="480" text-anchor="middle" font-size="20" font-weight="800">Abort + Replan</text><text x="815" y="480" text-anchor="middle" font-size="20" font-weight="800">Typed Result</text><text x="1120" y="480" text-anchor="middle" font-size="20" font-weight="800">Retrieval Filters</text><g fill="#94a3b8" font-size="14"><text x="205" y="240" text-anchor="middle">audio channel closes</text><text x="510" y="240" text-anchor="middle">user interrupts response</text><text x="815" y="240" text-anchor="middle">plugin/action fails</text><text x="1120" y="240" text-anchor="middle">wrong old fact retrieved</text><text x="205" y="512" text-anchor="middle">idle state + new handshake</text><text x="510" y="512" text-anchor="middle">stop playback immediately</text><text x="815" y="512" text-anchor="middle">JSON-RPC error path</text><text x="1120" y="512" text-anchor="middle">scope by user/time/domain</text></g></g></svg>
