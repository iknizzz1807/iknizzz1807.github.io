<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Failure mode analysis</title><desc id="desc">Failure modes and containment strategies for SkillForge.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Failure Mode Analysis</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A serious system design case study names what can break and how it is contained.</text><g fill="#0f111a" stroke="#ef4444" stroke-opacity=".55"><rect x="70" y="160" width="340" height="150" rx="18"/><rect x="480" y="160" width="340" height="150" rx="18"/><rect x="890" y="160" width="340" height="150" rx="18"/></g><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="70" y="420" width="340" height="150" rx="18"/><rect x="480" y="420" width="340" height="150" rx="18"/><rect x="890" y="420" width="340" height="150" rx="18"/></g><text x="240" y="205" text-anchor="middle" font-size="22" font-weight="800">AI Service Slow</text><text x="240" y="238" text-anchor="middle" fill="#94a3b8" font-size="15">matching latency spikes</text><text x="650" y="205" text-anchor="middle" font-size="22" font-weight="800">Socket Disconnect</text><text x="650" y="238" text-anchor="middle" fill="#94a3b8" font-size="15">mobile tab sleeps / network drops</text><text x="1060" y="205" text-anchor="middle" font-size="22" font-weight="800">Duplicate Event</text><text x="1060" y="238" text-anchor="middle" fill="#94a3b8" font-size="15">retry creates repeated action</text><text x="240" y="465" text-anchor="middle" font-size="22" font-weight="800">Containment</text><text x="240" y="500" text-anchor="middle" fill="#94a3b8" font-size="15">AI out-of-band; core UX remains alive</text><text x="650" y="465" text-anchor="middle" font-size="22" font-weight="800">Recovery</text><text x="650" y="500" text-anchor="middle" fill="#94a3b8" font-size="15">rejoin room; fetch latest canonical state</text><text x="1060" y="465" text-anchor="middle" font-size="22" font-weight="800">Idempotency</text><text x="1060" y="500" text-anchor="middle" fill="#94a3b8" font-size="15">event_id + version checks</text></g></svg>
