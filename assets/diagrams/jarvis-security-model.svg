<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">JARVIS security model</title><desc id="desc">Security model for voice assistant.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Security Model</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A voice assistant can hear private data and execute tools, so trust boundaries must be explicit.</text><g fill="#0f111a" stroke="#f59e0b" stroke-opacity=".65"><rect x="80" y="170" width="330" height="140" rx="18"/><rect x="485" y="170" width="330" height="140" rx="18"/><rect x="890" y="170" width="330" height="140" rx="18"/><rect x="80" y="440" width="330" height="140" rx="18"/><rect x="485" y="440" width="330" height="140" rx="18"/><rect x="890" y="440" width="330" height="140" rx="18"/></g><text x="245" y="220" text-anchor="middle" font-size="21" font-weight="800">Device Identity</text><text x="245" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">Device-Id, Client-Id, Authorization</text><text x="650" y="220" text-anchor="middle" font-size="21" font-weight="800">Transport Security</text><text x="650" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">WebSocket auth or AES-CTR UDP</text><text x="1055" y="220" text-anchor="middle" font-size="21" font-weight="800">Tool Allowlist</text><text x="1055" y="252" text-anchor="middle" fill="#94a3b8" font-size="14">MCP tools must be registered</text><text x="245" y="490" text-anchor="middle" font-size="21" font-weight="800">Action Confirmation</text><text x="245" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">sensitive tasks need confirmation</text><text x="650" y="490" text-anchor="middle" font-size="21" font-weight="800">Memory Privacy</text><text x="650" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">scope facts by user/session/domain</text><text x="1055" y="490" text-anchor="middle" font-size="21" font-weight="800">Prompt Injection</text><text x="1055" y="522" text-anchor="middle" fill="#94a3b8" font-size="14">tools separated from raw model text</text></g></svg>
