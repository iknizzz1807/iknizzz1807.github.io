<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 780" role="img" aria-labelledby="title desc"><title id="title">Multi-instance Directus topology</title><desc id="desc">Main Directus and event Directus instances.</desc><rect width="1300" height="780" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Multi-Instance Directus Topology</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A central control plane manages events; each event can own isolated operational data.</text><rect x="95" y="185" width="410" height="350" rx="26" fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"/><rect x="795" y="185" width="410" height="350" rx="26" fill="#0f111a" stroke="#10b981" stroke-opacity=".7"/><text x="300" y="245" text-anchor="middle" font-size="28" font-weight="800">Main Directus</text><text x="300" y="282" text-anchor="middle" fill="#94a3b8" font-size="15">users, events, API keys, access control</text><text x="1000" y="245" text-anchor="middle" font-size="28" font-weight="800">Event Directus</text><text x="1000" y="282" text-anchor="middle" fill="#94a3b8" font-size="15">sessions, speakers, exhibitors, attendees</text><g fill="#111426"><rect x="150" y="330" width="120" height="54" rx="10"/><rect x="290" y="330" width="120" height="54" rx="10"/><rect x="150" y="405" width="120" height="54" rx="10"/><rect x="290" y="405" width="120" height="54" rx="10"/><rect x="850" y="330" width="120" height="54" rx="10"/><rect x="990" y="330" width="120" height="54" rx="10"/><rect x="850" y="405" width="120" height="54" rx="10"/><rect x="990" y="405" width="120" height="54" rx="10"/></g><text x="210" y="363" text-anchor="middle" font-size="14">events</text><text x="350" y="363" text-anchor="middle" font-size="14">api_keys</text><text x="210" y="438" text-anchor="middle" font-size="14">owners</text><text x="350" y="438" text-anchor="middle" font-size="14">viewers</text><text x="910" y="363" text-anchor="middle" font-size="14">sessions</text><text x="1050" y="363" text-anchor="middle" font-size="14">speakers</text><text x="910" y="438" text-anchor="middle" font-size="14">exhibitors</text><text x="1050" y="438" text-anchor="middle" font-size="14">attendees</text><rect x="560" y="330" width="180" height="92" rx="18" fill="#111426" stroke="#818cf8"/><text x="650" y="367" text-anchor="middle" font-size="18" font-weight="800">Event Record</text><text x="650" y="395" text-anchor="middle" fill="#94a3b8" font-size="13">directus_url + token + qdrant config</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M505 375 H560"/><path d="M740 375 H795"/></g></svg>
