<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Vector sync</title><desc id="desc">Directus to Qdrant vector synchronization.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Relational-to-Vector Sync</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Directus remains the source of truth; Qdrant serves semantic retrieval.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="80" y="225" width="240" height="120" rx="18"/><rect x="405" y="225" width="240" height="120" rx="18"/><rect x="730" y="225" width="240" height="120" rx="18"/><rect x="405" y="500" width="240" height="120" rx="18"/><rect x="980" y="500" width="240" height="120" rx="18"/></g><text x="200" y="274" text-anchor="middle" font-size="21" font-weight="800">Directus Record</text><text x="200" y="305" text-anchor="middle" fill="#94a3b8" font-size="14">session / speaker / exhibitor</text><text x="525" y="274" text-anchor="middle" font-size="21" font-weight="800">Text Builder</text><text x="525" y="305" text-anchor="middle" fill="#94a3b8" font-size="14">semantic document</text><text x="850" y="274" text-anchor="middle" font-size="21" font-weight="800">Embedding</text><text x="850" y="305" text-anchor="middle" fill="#94a3b8" font-size="14">vector representation</text><text x="525" y="549" text-anchor="middle" font-size="21" font-weight="800">Payload</text><text x="525" y="580" text-anchor="middle" fill="#94a3b8" font-size="14">event_id, type, source id</text><text x="1100" y="549" text-anchor="middle" font-size="21" font-weight="800">Qdrant Upsert</text><text x="1100" y="580" text-anchor="middle" fill="#94a3b8" font-size="14">vector + payload</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M320 285 H405"/><path d="M645 285 H730"/><path d="M850 345 C790 460 675 510 645 540"/><path d="M645 560 H980"/></g></svg>
