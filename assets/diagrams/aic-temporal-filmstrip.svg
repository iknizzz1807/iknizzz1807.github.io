<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 860" role="img" aria-labelledby="title desc">
  <title id="title">AIC temporal filmstrip</title>
  <desc id="desc">Filmstrip style diagram for temporal sequence search.</desc>
  <rect width="1500" height="860" fill="#050713"/>
  <g font-family="Inter, Arial" fill="#f8fafc">
    <text x="750" y="70" text-anchor="middle" font-size="38" font-weight="800">Temporal Search as a Filmstrip</text>
    <text x="750" y="112" text-anchor="middle" fill="#94a3b8" font-size="18">The algorithm is not looking for one good frame. It is assembling an ordered mini-story.</text>
    <rect x="110" y="250" width="1280" height="300" rx="26" fill="#0b0e1a" stroke="#24305f"/>
    <g stroke="#1f2350" stroke-width="10"><line x1="150" y1="250" x2="150" y2="550"/><line x1="310" y1="250" x2="310" y2="550"/><line x1="470" y1="250" x2="470" y2="550"/><line x1="630" y1="250" x2="630" y2="550"/><line x1="790" y1="250" x2="790" y2="550"/><line x1="950" y1="250" x2="950" y2="550"/><line x1="1110" y1="250" x2="1110" y2="550"/><line x1="1270" y1="250" x2="1270" y2="550"/></g>
    <g>
      <rect x="205" y="315" width="190" height="140" rx="18" fill="#111426" stroke="#6366f1" stroke-width="3"/><text x="300" y="375" text-anchor="middle" font-size="22" font-weight="800">Q0</text><text x="300" y="410" text-anchor="middle" fill="#94a3b8" font-size="14">dog runs past</text>
      <rect x="655" y="315" width="190" height="140" rx="18" fill="#111426" stroke="#818cf8" stroke-width="3"/><text x="750" y="375" text-anchor="middle" font-size="22" font-weight="800">Anchor</text><text x="750" y="410" text-anchor="middle" fill="#94a3b8" font-size="14">person reaches door</text>
      <rect x="1105" y="315" width="190" height="140" rx="18" fill="#111426" stroke="#10b981" stroke-width="3"/><text x="1200" y="375" text-anchor="middle" font-size="22" font-weight="800">Q2</text><text x="1200" y="410" text-anchor="middle" fill="#94a3b8" font-size="14">door opens</text>
    </g>
    <g stroke="#818cf8" stroke-width="4" fill="none" stroke-dasharray="10 10"><path d="M395 385 C500 305 550 305 655 385"/><path d="M845 385 C950 305 1000 305 1105 385"/></g>
    <g fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="16"><text x="750" y="640" text-anchor="middle">Constraint: same video_id + ordered keyframes + frame gaps below MAX_FRAME_GAP</text><text x="750" y="685" text-anchor="middle">Output: temporal_sequence[] sorted by query_index, then shown as an explainable chain.</text></g>
  </g>
</svg>
