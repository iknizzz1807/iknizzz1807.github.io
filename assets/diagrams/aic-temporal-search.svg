<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc"><title id="title">Temporal search</title><desc id="desc">Multi-query temporal chain search.</desc><rect width="1500" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="750" y="62" text-anchor="middle" font-size="34" font-weight="800">Temporal Search: Finding a Sequence, Not a Single Frame</text><text x="750" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">Some queries describe a story: first X happens, then Y appears, then Z follows.</text><line x1="160" y1="370" x2="1340" y2="370" stroke="#24305f" stroke-width="8" stroke-linecap="round"/><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".7"><rect x="230" y="290" width="190" height="100" rx="18"/><rect x="655" y="290" width="190" height="100" rx="18"/><rect x="1080" y="290" width="190" height="100" rx="18"/></g><text x="325" y="333" text-anchor="middle" font-size="20" font-weight="800">Query 0</text><text x="325" y="360" text-anchor="middle" fill="#94a3b8" font-size="13">previous event</text><text x="750" y="333" text-anchor="middle" font-size="20" font-weight="800">Anchor</text><text x="750" y="360" text-anchor="middle" fill="#94a3b8" font-size="13">query index</text><text x="1175" y="333" text-anchor="middle" font-size="20" font-weight="800">Query 2</text><text x="1175" y="360" text-anchor="middle" fill="#94a3b8" font-size="13">next event</text><text x="750" y="535" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="800">Valid if each selected keyframe belongs to the same video and stays inside MAX_FRAME_GAP.</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M420 340 H655"/><path d="M845 340 H1080"/></g></svg>
