<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Memory layers</title><desc id="desc">JARVIS memory layers and retrieval.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Memory Architecture</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A voice assistant needs continuity without overflowing the LLM context window.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="120" y="170" width="1060" height="90" rx="18"/><rect x="190" y="290" width="920" height="90" rx="18"/><rect x="260" y="410" width="780" height="90" rx="18"/><rect x="330" y="530" width="640" height="90" rx="18"/></g><text x="650" y="225" text-anchor="middle" font-size="22" font-weight="800">Immediate Audio / Turn State</text><text x="650" y="345" text-anchor="middle" font-size="22" font-weight="800">Short-Term Conversation Window</text><text x="650" y="465" text-anchor="middle" font-size="22" font-weight="800">Working Summary + User Profile</text><text x="650" y="585" text-anchor="middle" font-size="22" font-weight="800">Long-Term ChromaDB Semantic Memory</text><text x="650" y="700" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="17">Retrieve facts only when they are relevant; do not stuff every past conversation into the prompt.</text></g></svg>
