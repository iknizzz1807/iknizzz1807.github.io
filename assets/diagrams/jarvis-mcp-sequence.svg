<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc"><title id="title">MCP sequence</title><desc id="desc">MCP initialize tools list and tools call flow.</desc><rect width="1400" height="820" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="700" y="60" text-anchor="middle" font-size="34" font-weight="800">MCP Tool Discovery + Invocation</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".6"><rect x="130" y="120" width="220" height="70" rx="14"/><rect x="590" y="120" width="220" height="70" rx="14"/><rect x="1050" y="120" width="220" height="70" rx="14"/></g><text x="240" y="163" text-anchor="middle" font-size="18" font-weight="700">LLM / Backend</text><text x="700" y="163" text-anchor="middle" font-size="18" font-weight="700">MCP Client</text><text x="1160" y="163" text-anchor="middle" font-size="18" font-weight="700">ESP32 MCP Server</text></g><g stroke="#24305f" stroke-width="2" stroke-dasharray="8 8"><path d="M240 190 V750"/><path d="M700 190 V750"/><path d="M1160 190 V750"/></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M1160 245 H700"/><path d="M700 315 H1160"/><path d="M700 385 H1160"/><path d="M1160 455 H700"/><path d="M240 525 H700"/><path d="M700 595 H1160"/><path d="M1160 665 H700"/></g><g font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="15"><text x="760" y="232">hello features { mcp:true }</text><text x="745" y="302">initialize</text><text x="745" y="372">tools/list</text><text x="760" y="442">tools: set_volume, gpio, status...</text><text x="270" y="512">LLM chooses device action</text><text x="745" y="582">tools/call(name,args)</text><text x="760" y="652">result / error</text></g></svg>
