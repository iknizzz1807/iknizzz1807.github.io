<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc"><title id="title">Demo flow</title><desc id="desc">Demo flow for Visual Hive.</desc><rect width="1400" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="700" y="62" text-anchor="middle" font-size="34" font-weight="800">Demo Narrative Flow</text><text x="700" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">A compelling demo should show data getting cleaner, safer, and more queryable at each step.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="70" y="260" width="180" height="100" rx="18"/><rect x="305" y="260" width="180" height="100" rx="18"/><rect x="540" y="260" width="180" height="100" rx="18"/><rect x="775" y="260" width="180" height="100" rx="18"/><rect x="1010" y="260" width="180" height="100" rx="18"/></g><text x="160" y="300" text-anchor="middle" font-size="19" font-weight="800">Upload Dirty File</text><text x="160" y="328" text-anchor="middle" fill="#94a3b8" font-size="13">CSV/XLSX</text><text x="395" y="300" text-anchor="middle" font-size="19" font-weight="800">Map Headers</text><text x="395" y="328" text-anchor="middle" fill="#94a3b8" font-size="13">synonyms + fuzzy</text><text x="630" y="300" text-anchor="middle" font-size="19" font-weight="800">Review Diff</text><text x="630" y="328" text-anchor="middle" fill="#94a3b8" font-size="13">create/update/skip</text><text x="865" y="300" text-anchor="middle" font-size="19" font-weight="800">Sync Vectors</text><text x="865" y="328" text-anchor="middle" fill="#94a3b8" font-size="13">Qdrant</text><text x="1100" y="300" text-anchor="middle" font-size="19" font-weight="800">Query Assistant</text><text x="1100" y="328" text-anchor="middle" fill="#94a3b8" font-size="13">semantic retrieval</text></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M250 310 H305"/><path d="M485 310 H540"/><path d="M720 310 H775"/><path d="M955 310 H1010"/></g></svg>
