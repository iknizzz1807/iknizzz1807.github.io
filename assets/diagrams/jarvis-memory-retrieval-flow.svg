<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc"><title id="title">Memory retrieval flow</title><desc id="desc">How JARVIS decides whether to retrieve memory.</desc><rect width="1400" height="820" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="700" y="62" text-anchor="middle" font-size="36" font-weight="800">Memory Retrieval Is a Decision, Not a Dump</text><text x="700" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">The assistant should remember the right fact at the right time, not drag every old detail into every prompt.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="80" y="250" width="210" height="100" rx="18"/><rect x="365" y="250" width="210" height="100" rx="18"/><rect x="650" y="250" width="210" height="100" rx="18"/><rect x="935" y="250" width="210" height="100" rx="18"/><rect x="650" y="520" width="210" height="100" rx="18"/></g><text x="185" y="292" text-anchor="middle" font-size="19" font-weight="800">User Utterance</text><text x="185" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">"remind me like last time"</text><text x="470" y="292" text-anchor="middle" font-size="19" font-weight="800">Intent Classifier</text><text x="470" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">needs memory?</text><text x="755" y="292" text-anchor="middle" font-size="19" font-weight="800">Vector Search</text><text x="755" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">ChromaDB facts</text><text x="1040" y="292" text-anchor="middle" font-size="19" font-weight="800">Prompt Builder</text><text x="1040" y="322" text-anchor="middle" fill="#94a3b8" font-size="13">inject only relevant facts</text><text x="755" y="562" text-anchor="middle" font-size="19" font-weight="800">Memory Write</text><text x="755" y="592" text-anchor="middle" fill="#94a3b8" font-size="13">summarize after turn</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M290 300 H365"/><path d="M575 300 H650"/><path d="M860 300 H935"/><path d="M1040 350 C1020 490 860 560 860 560"/><path d="M650 560 C430 560 410 365 470 350"/></g></svg>
