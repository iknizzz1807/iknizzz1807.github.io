<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc"><title id="title">WebSocket handshake</title><desc id="desc">JARVIS WebSocket protocol handshake and audio channel.</desc><rect width="1400" height="820" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="700" y="60" text-anchor="middle" font-size="34" font-weight="800">WebSocket Session Handshake</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".55"><rect x="150" y="120" width="210" height="70" rx="14"/><rect x="595" y="120" width="210" height="70" rx="14"/><rect x="1040" y="120" width="210" height="70" rx="14"/></g><text x="255" y="163" text-anchor="middle" font-size="18" font-weight="700">ESP32 Firmware</text><text x="700" y="163" text-anchor="middle" font-size="18" font-weight="700">WebSocket Server</text><text x="1145" y="163" text-anchor="middle" font-size="18" font-weight="700">AI Runtime</text></g><g stroke="#24305f" stroke-width="2" stroke-dasharray="8 8"><path d="M255 190 V750"/><path d="M700 190 V750"/><path d="M1145 190 V750"/></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M255 245 H700"/><path d="M700 315 H255"/><path d="M255 385 H700"/><path d="M700 455 H1145"/><path d="M1145 525 H700"/><path d="M700 595 H255"/><path d="M255 665 H700"/></g><g font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="15"><text x="290" y="232">Connect(headers: Authorization, Device-Id, Client-Id)</text><text x="315" y="302">hello { transport:websocket, audio:opus, mcp:true }</text><text x="315" y="372">binary Opus frames + listen events</text><text x="725" y="442">ASR → LLM → tools → TTS</text><text x="760" y="512">stream audio + JSON events</text><text x="315" y="582">TTS / STT / MCP / system messages</text><text x="315" y="652">abort { reason:wake_word_detected }</text></g></svg>
