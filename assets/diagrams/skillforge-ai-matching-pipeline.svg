<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">AI matching pipeline</title><desc id="desc">Semantic matching pipeline for SkillForge.</desc><rect width="1200" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="600" y="62" text-anchor="middle" font-size="34" font-weight="800">AI Matching Pipeline</text><text x="600" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">The model ranks semantic compatibility, while Go decides product behavior.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="50" y="160" width="190" height="92" rx="16"/><rect x="50" y="410" width="190" height="92" rx="16"/><rect x="315" y="280" width="180" height="92" rx="16"/><rect x="570" y="280" width="180" height="92" rx="16"/><rect x="825" y="280" width="180" height="92" rx="16"/><rect x="825" y="515" width="245" height="92" rx="16"/></g><text x="145" y="198" text-anchor="middle" font-size="18" font-weight="700">Student Profile</text><text x="145" y="224" text-anchor="middle" fill="#94a3b8" font-size="13">skills, bio, goals</text><text x="145" y="448" text-anchor="middle" font-size="18" font-weight="700">Project Brief</text><text x="145" y="474" text-anchor="middle" fill="#94a3b8" font-size="13">requirements, domain</text><text x="405" y="318" text-anchor="middle" font-size="18" font-weight="700">Normalize</text><text x="405" y="344" text-anchor="middle" fill="#94a3b8" font-size="13">canonical text</text><text x="660" y="318" text-anchor="middle" font-size="18" font-weight="700">Embed</text><text x="660" y="344" text-anchor="middle" fill="#94a3b8" font-size="13">SentenceTransformers</text><text x="915" y="318" text-anchor="middle" font-size="18" font-weight="700">Rank</text><text x="915" y="344" text-anchor="middle" fill="#94a3b8" font-size="13">cosine similarity</text><text x="948" y="553" text-anchor="middle" font-size="18" font-weight="700">Notify + Explain</text><text x="948" y="579" text-anchor="middle" fill="#94a3b8" font-size="13">match score + reason</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M240 206 C295 220 300 302 315 315"/><path d="M240 456 C295 440 300 355 315 337"/><path d="M495 326 H570"/><path d="M750 326 H825"/><path d="M915 372 V515"/></g><text x="600" y="690" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="17">The AI service returns ranked candidates; it does not own marketplace state.</text></svg>
