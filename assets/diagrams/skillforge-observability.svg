<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Observability plan</title><desc id="desc">Metrics and logs needed for SkillForge.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Observability Plan</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">What I would measure before claiming the architecture is production-ready.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="80" y="160" width="250" height="170" rx="18"/><rect x="385" y="160" width="250" height="170" rx="18"/><rect x="690" y="160" width="250" height="170" rx="18"/><rect x="995" y="160" width="250" height="170" rx="18"/><rect x="230" y="430" width="250" height="170" rx="18"/><rect x="535" y="430" width="250" height="170" rx="18"/><rect x="840" y="430" width="250" height="170" rx="18"/></g><text x="205" y="205" text-anchor="middle" font-size="21" font-weight="800">API Latency</text><text x="205" y="240" text-anchor="middle" fill="#94a3b8" font-size="15">p50 / p95 / p99 by route</text><text x="510" y="205" text-anchor="middle" font-size="21" font-weight="800">Socket Health</text><text x="510" y="240" text-anchor="middle" fill="#94a3b8" font-size="15">rooms, joins, disconnects</text><text x="815" y="205" text-anchor="middle" font-size="21" font-weight="800">Match Quality</text><text x="815" y="240" text-anchor="middle" fill="#94a3b8" font-size="15">accept rate, click rate</text><text x="1120" y="205" text-anchor="middle" font-size="21" font-weight="800">AI Latency</text><text x="1120" y="240" text-anchor="middle" fill="#94a3b8" font-size="15">embedding + ranking time</text><text x="355" y="475" text-anchor="middle" font-size="21" font-weight="800">DB Pressure</text><text x="355" y="510" text-anchor="middle" fill="#94a3b8" font-size="15">slow queries, write volume</text><text x="660" y="475" text-anchor="middle" font-size="21" font-weight="800">Event Loss</text><text x="660" y="510" text-anchor="middle" fill="#94a3b8" font-size="15">emit vs ack mismatch</text><text x="965" y="475" text-anchor="middle" font-size="21" font-weight="800">Error Budget</text><text x="965" y="510" text-anchor="middle" fill="#94a3b8" font-size="15">failed actions per workflow</text></g></svg>
