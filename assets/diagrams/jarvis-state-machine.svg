<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" role="img" aria-labelledby="title desc"><title id="title">JARVIS conversational state machine</title><desc id="desc">State machine for wake, listen, think, speak, interrupt, and recover.</desc><rect width="1300" height="820" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#818cf8"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="36" font-weight="800">Conversation State Machine</text><text x="650" y="100" text-anchor="middle" fill="#94a3b8" font-size="17">The assistant feels natural only if it can leave any state safely and recover.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".65"><rect x="110" y="250" width="160" height="90" rx="18"/><rect x="350" y="250" width="160" height="90" rx="18"/><rect x="590" y="250" width="160" height="90" rx="18"/><rect x="830" y="250" width="160" height="90" rx="18"/><rect x="590" y="500" width="160" height="90" rx="18"/><rect x="1010" y="500" width="160" height="90" rx="18" stroke="#ef4444"/></g><text x="190" y="304" text-anchor="middle" font-size="20" font-weight="800">Idle</text><text x="430" y="304" text-anchor="middle" font-size="20" font-weight="800">Listening</text><text x="670" y="304" text-anchor="middle" font-size="20" font-weight="800">Thinking</text><text x="910" y="304" text-anchor="middle" font-size="20" font-weight="800">Speaking</text><text x="670" y="554" text-anchor="middle" font-size="20" font-weight="800">Tool Call</text><text x="1090" y="554" text-anchor="middle" font-size="20" font-weight="800">Abort</text><g fill="#94a3b8" font-size="14"><text x="190" y="328" text-anchor="middle">low power wait</text><text x="430" y="328" text-anchor="middle">capture frames</text><text x="670" y="328" text-anchor="middle">ASR + LLM</text><text x="910" y="328" text-anchor="middle">TTS playback</text><text x="670" y="578" text-anchor="middle">MCP / plugin</text><text x="1090" y="578" text-anchor="middle">barge-in</text></g></g><g stroke="#818cf8" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M270 295 H350"/><path d="M510 295 H590"/><path d="M750 295 H830"/><path d="M910 340 C890 455 780 535 750 545"/><path d="M670 500 V340"/><path d="M990 295 C1085 315 1110 415 1090 500"/><path d="M1010 555 C745 690 290 555 190 340"/></g><g font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="14"><text x="285" y="275">wake word</text><text x="525" y="275">speech end</text><text x="765" y="275">first answer chunk</text><text x="980" y="390">new speech detected</text><text x="760" y="455">tool required</text><text x="535" y="680">reset to listen, not crash</text></g></svg>
