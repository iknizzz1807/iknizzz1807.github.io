<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Observability plan</title><desc id="desc">Operational metrics for ingestion platform.</desc><rect width="1300" height="760" fill="#050713"/><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Observability Plan</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">For ingestion systems, the key metric is not uptime alone; it is trust in each transformation.</text><g fill="#0f111a" stroke="#6366f1" stroke-opacity=".6"><rect x="80" y="160" width="250" height="150" rx="18"/><rect x="385" y="160" width="250" height="150" rx="18"/><rect x="690" y="160" width="250" height="150" rx="18"/><rect x="995" y="160" width="250" height="150" rx="18"/><rect x="230" y="430" width="250" height="150" rx="18"/><rect x="535" y="430" width="250" height="150" rx="18"/><rect x="840" y="430" width="250" height="150" rx="18"/></g><text x="205" y="208" text-anchor="middle" font-size="21" font-weight="800">Parse Failures</text><text x="205" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">bad quotes, columns, encoding</text><text x="510" y="208" text-anchor="middle" font-size="21" font-weight="800">Mapping Confidence</text><text x="510" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">unknown headers per import</text><text x="815" y="208" text-anchor="middle" font-size="21" font-weight="800">Validation Errors</text><text x="815" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">type and required field issues</text><text x="1120" y="208" text-anchor="middle" font-size="21" font-weight="800">Mutation Volume</text><text x="1120" y="240" text-anchor="middle" fill="#94a3b8" font-size="14">creates, updates, skips</text><text x="355" y="478" text-anchor="middle" font-size="21" font-weight="800">Vector Lag</text><text x="355" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">Directus vs Qdrant freshness</text><text x="660" y="478" text-anchor="middle" font-size="21" font-weight="800">Job Duration</text><text x="660" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">stage-level p95 runtime</text><text x="965" y="478" text-anchor="middle" font-size="21" font-weight="800">Operator Review</text><text x="965" y="510" text-anchor="middle" fill="#94a3b8" font-size="14">rows needing human decision</text></g></svg>
