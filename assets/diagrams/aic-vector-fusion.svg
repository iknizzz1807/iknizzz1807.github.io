<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Visual vector fusion</title><desc id="desc">CLIP and BEIT3 visual scores fused.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Visual Retrieval Fusion</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">CLIP and BEIT3 have different failure modes, so the system combines normalized scores.</text><g fill="#0f111a" stroke="#10b981" stroke-opacity=".65"><rect x="85" y="250" width="220" height="110" rx="18"/><rect x="415" y="160" width="220" height="110" rx="18"/><rect x="415" y="380" width="220" height="110" rx="18"/><rect x="770" y="250" width="220" height="110" rx="18"/><rect x="1065" y="250" width="170" height="110" rx="18"/></g><text x="195" y="294" text-anchor="middle" font-size="20" font-weight="800">Text Query</text><text x="195" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">natural language</text><text x="525" y="204" text-anchor="middle" font-size="20" font-weight="800">CLIP Encoder</text><text x="525" y="234" text-anchor="middle" fill="#94a3b8" font-size="13">open_clip text</text><text x="525" y="424" text-anchor="middle" font-size="20" font-weight="800">BEIT3 Encoder</text><text x="525" y="454" text-anchor="middle" fill="#94a3b8" font-size="13">XLM-R text</text><text x="880" y="294" text-anchor="middle" font-size="20" font-weight="800">Score Fusion</text><text x="880" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">0.5 CLIP + 0.5 BEIT3</text><text x="1150" y="294" text-anchor="middle" font-size="20" font-weight="800">Ranked Frames</text><text x="1150" y="324" text-anchor="middle" fill="#94a3b8" font-size="13">video_id + keyframe</text></g><g stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M305 290 C360 245 365 215 415 215"/><path d="M305 320 C360 365 365 435 415 435"/><path d="M635 215 C700 230 720 295 770 300"/><path d="M635 435 C700 415 720 325 770 315"/><path d="M990 305 H1065"/></g><text x="650" y="650" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono,monospace" font-size="17">fused_score = 0.5 * normalized_clip_score + 0.5 * normalized_beit3_score</text></svg>
