<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc"><title id="title">Object constraint search</title><desc id="desc">MongoDB aggregation for object constraints.</desc><rect width="1300" height="760" fill="#050713"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker></defs><g font-family="Inter,Arial" fill="#f8fafc"><text x="650" y="62" text-anchor="middle" font-size="34" font-weight="800">Object Constraint Search</text><text x="650" y="96" text-anchor="middle" fill="#94a3b8" font-size="17">Semantic search can find concepts; object filters enforce concrete visual facts.</text><g fill="#0f111a" stroke="#f59e0b" stroke-opacity=".65"><rect x="100" y="250" width="250" height="120" rx="18"/><rect x="500" y="250" width="250" height="120" rx="18"/><rect x="900" y="250" width="250" height="120" rx="18"/></g><text x="225" y="298" text-anchor="middle" font-size="21" font-weight="800">Object Query</text><text x="225" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">label + confidence + count</text><text x="625" y="298" text-anchor="middle" font-size="21" font-weight="800">Mongo Aggregate</text><text x="625" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">$filter + $size + $match</text><text x="1025" y="298" text-anchor="middle" font-size="21" font-weight="800">Keyframe IDs</text><text x="1025" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">video_id + frame</text></g><g stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M350 310 H500"/><path d="M750 310 H900"/></g></svg>
